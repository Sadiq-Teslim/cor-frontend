<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0F1E">
  <meta name="description" content="Cor - Your heart has a guardian">
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQ29yIiwic2hvcnRfbmFtZSI6IkNvciIsInN0YXJ0X3VybCI6Ii8iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMEEwRjFFIiwidGhlbWVfY29sb3IiOiIjMEEwRjFFIn0=">
  <title>Cor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0F1E;
      --card: #111827;
      --border: #1E2D45;
      --accent: #00E5CC;
      --amber: #F5A623;
      --alert: #FF6B6B;
      --text: #F0F4FF;
      --sub: #8896A8;
      --radius: 12px;
      --gap: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #060912;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    #root {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: var(--bg);
      position: relative;
    }

    @media (max-width: 480px) {
      #root {
        max-width: 100%;
      }
    }

    .screen {
      display: none;
      min-height: 100vh;
      animation: fadeIn 150ms;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    @keyframes ring {
      from { stroke-dashoffset: 283; }
      to { stroke-dashoffset: 0; }
    }

    button {
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      background: none;
    }

    input, textarea {
      font-family: 'Inter', sans-serif;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-size: 16px;
      width: 100%;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: #0A0F1E;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      border-radius: var(--radius);
      margin-top: 48px;
    }

    .btn-secondary {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 16px;
      padding: 16px;
      border-radius: var(--radius);
      margin-top: 12px;
    }

    .pill {
      display: inline-flex;
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      margin: 4px;
      font-size: 14px;
    }

    .pill.selected {
      background: var(--accent);
      color: #0A0F1E;
      border-color: var(--accent);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .back-arrow {
      color: var(--sub);
      font-size: 24px;
      cursor: pointer;
      display: inline-block;
      margin-bottom: 16px;
    }

    #hey-cor-button {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: #0A0F1E;
      font-size: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      animation: pulse 2s ease-in-out infinite;
    }

    #hey-cor-button.visible {
      display: flex;
    }

    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 64px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: none;
      align-items: center;
      justify-content: space-around;
      z-index: 40;
    }

    #bottom-nav.visible {
      display: flex;
    }

    .nav-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--sub);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 8px;
    }

    .nav-tab.active {
      color: var(--accent);
    }

    .nav-tab-icon {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(6, 9, 18, 0.95);
      z-index: 100;
      overflow-y: auto;
      padding: 32px 24px;
      display: none;
    }

    .overlay.visible {
      display: block;
    }

    .modal-bottom {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 480px;
      max-width: 100%;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px;
      z-index: 200;
      display: none;
    }

    .modal-bottom.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [currentScreen, setCurrentScreen] = useState('screen-1');
      const [selectedLanguage, setSelectedLanguage] = useState('English');
      const [onboardingData, setOnboardingData] = useState({
        name: 'Chidi',
        age: '',
        sex: '',
        highBP: '',
        medication: '',
        smokeDrink: '',
        activity: '',
        sleep: ''
      });
      const [onboardingStep, setOnboardingStep] = useState(1);
      const [fileUploaded, setFileUploaded] = useState(false);
      const [connectedDevices, setConnectedDevices] = useState([]);
      const [showHeyCor, setShowHeyCor] = useState(false);
      const [showAlert, setShowAlert] = useState(false);
      const [bpReading, setBpReading] = useState(null);
      const [countdown, setCountdown] = useState(30);
      const [isReading, setIsReading] = useState(false);
      const [activeNav, setActiveNav] = useState('home');
      const [medicationTaken, setMedicationTaken] = useState(false);
      const [trendRange, setTrendRange] = useState('7D');
      const [reportRange, setReportRange] = useState('7 days');
      const [reportGenerated, setReportGenerated] = useState(false);
      const [corResponse, setCorResponse] = useState("Ask me anything about your heart health...");
      const [mealMode, setMealMode] = useState('camera');
      const [mealAnalyzed, setMealAnalyzed] = useState(false);
      const [mealAnalyzing, setMealAnalyzing] = useState(false);
      const [feelingSelected, setFeelingSelected] = useState(null);

      useEffect(() => {
        const isPostOnboarding = !currentScreen.match(/screen-[1-6]/);
        document.getElementById('hey-cor-button').classList.toggle('visible', isPostOnboarding);
        document.getElementById('bottom-nav').classList.toggle('visible', isPostOnboarding);
      }, [currentScreen]);

      const showScreen = (id) => {
        setCurrentScreen(id);
        window.scrollTo(0, 0);
      };

      const startBPReading = (isBaseline = false) => {
        setIsReading(true);
        setCountdown(30);
        setBpReading(null);
        
        const interval = setInterval(() => {
          setCountdown(prev => {
            if (prev <= 1) {
              clearInterval(interval);
              setIsReading(false);
              if (isBaseline) {
                setBpReading({
                  hr: 74,
                  hrv: 52,
                  status: 'normal',
                  message: 'Your baseline is set. Cor will now personalise your monitoring.'
                });
              } else {
                setBpReading({
                  hr: 79,
                  hrv: 46,
                  status: 'elevated',
                  message: 'Slightly elevated compared to your average this week. Worth monitoring.'
                });
              }
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const analyzeMeal = () => {
        setMealAnalyzing(true);
        setTimeout(() => {
          setMealAnalyzing(false);
          setMealAnalyzed(true);
        }, 2000);
      };

      const navigateTo = (tab) => {
        setActiveNav(tab);
        switch(tab) {
          case 'home': showScreen('screen-7'); break;
          case 'insights': showScreen('screen-11'); break;
          case 'log': showScreen('screen-9'); break;
          case 'settings': showScreen('screen-15'); break;
        }
      };

      return (
        <>
          {/* Screen 1 - Welcome */}
          <div id="screen-1" className={`screen ${currentScreen === 'screen-1' ? 'active' : ''}`}>
            <div style={{
              minHeight: '100vh',
              display: 'flex',
              flexDirection: 'column',
              justifyContent: 'center',
              alignItems: 'center',
              padding: '32px'
            }}>
              <div style={{
                fontFamily: 'Inter',
                fontWeight: 700,
                fontSize: '72px',
                color: 'var(--accent)',
                textAlign: 'center'
              }}>Cor</div>
              <div style={{
                fontFamily: 'Inter',
                fontWeight: 400,
                fontSize: '18px',
                color: 'var(--sub)',
                textAlign: 'center',
                marginTop: '12px'
              }}>Your heart has a guardian.</div>
              <button className="btn-primary" onClick={() => showScreen('screen-2')}>
                Get Started
              </button>
            </div>
          </div>

          {/* Screen 2 - Language Select */}
          <div id="screen-2" className={`screen ${currentScreen === 'screen-2' ? 'active' : ''}`}>
            <div style={{ padding: '32px' }}>
              <h1 style={{ fontWeight: 700, fontSize: '24px', marginBottom: '24px' }}>
                Choose your language
              </h1>
              <div style={{
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: '12px',
                marginBottom: '32px'
              }}>
                {['English', 'Pidgin', 'Yoruba', 'Igbo', 'Hausa', 'French'].map(lang => (
                  <div
                    key={lang}
                    onClick={() => setSelectedLanguage(lang)}
                    style={{
                      background: 'var(--card)',
                      border: `1px solid ${selectedLanguage === lang ? 'var(--accent)' : 'var(--border)'}`,
                      color: selectedLanguage === lang ? 'var(--accent)' : 'var(--text)',
                      borderRadius: 'var(--radius)',
                      padding: '20px',
                      textAlign: 'center',
                      fontWeight: 600,
                      fontSize: '16px',
                      cursor: 'pointer'
                    }}
                  >
                    {lang}
                  </div>
                ))}
              </div>
              {selectedLanguage && (
                <button className="btn-primary" style={{ marginTop: 0 }} onClick={() => showScreen('screen-3')}>
                  Continue
                </button>
              )}
            </div>
          </div>

          {/* Screen 3 - Onboarding Questions */}
          <div id="screen-3" className={`screen ${currentScreen === 'screen-3' ? 'active' : ''}`}>
            <div>
              <div style={{
                height: '4px',
                background: 'var(--border)',
                position: 'relative'
              }}>
                <div style={{
                  height: '100%',
                  width: `${(onboardingStep / 8) * 100}%`,
                  background: 'var(--accent)',
                  transition: 'width 0.3s'
                }}></div>
              </div>
              <div style={{
                padding: '16px 32px',
                fontSize: '13px',
                color: 'var(--sub)'
              }}>
                Step {onboardingStep} of 8
              </div>
              <div style={{ padding: '0 32px 32px' }}>
                <div className="card">
                  {onboardingStep === 1 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        What is your name?
                      </h2>
                      <input
                        type="text"
                        placeholder="Enter your name"
                        value={onboardingData.name}
                        onChange={(e) => setOnboardingData({...onboardingData, name: e.target.value})}
                      />
                    </>
                  )}
                  {onboardingStep === 2 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        How old are you?
                      </h2>
                      <input
                        type="number"
                        placeholder="Age"
                        value={onboardingData.age}
                        onChange={(e) => setOnboardingData({...onboardingData, age: e.target.value})}
                      />
                    </>
                  )}
                  {onboardingStep === 3 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        Biological sex?
                      </h2>
                      <div>
                        {['Male', 'Female', 'Prefer not to say'].map(opt => (
                          <button
                            key={opt}
                            className={`pill ${onboardingData.sex === opt ? 'selected' : ''}`}
                            onClick={() => setOnboardingData({...onboardingData, sex: opt})}
                          >
                            {opt}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                  {onboardingStep === 4 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        Ever diagnosed with high blood pressure?
                      </h2>
                      <div>
                        {['Yes', 'No', 'Not sure'].map(opt => (
                          <button
                            key={opt}
                            className={`pill ${onboardingData.highBP === opt ? 'selected' : ''}`}
                            onClick={() => setOnboardingData({...onboardingData, highBP: opt})}
                          >
                            {opt}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                  {onboardingStep === 5 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        Do you take regular medication?
                      </h2>
                      <div>
                        {['Yes', 'No'].map(opt => (
                          <button
                            key={opt}
                            className={`pill ${onboardingData.medication === opt ? 'selected' : ''}`}
                            onClick={() => setOnboardingData({...onboardingData, medication: opt})}
                          >
                            {opt}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                  {onboardingStep === 6 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        Do you smoke or drink alcohol?
                      </h2>
                      <div>
                        {['Yes', 'No', 'Sometimes'].map(opt => (
                          <button
                            key={opt}
                            className={`pill ${onboardingData.smokeDrink === opt ? 'selected' : ''}`}
                            onClick={() => setOnboardingData({...onboardingData, smokeDrink: opt})}
                          >
                            {opt}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                  {onboardingStep === 7 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        How active are you?
                      </h2>
                      <div>
                        {['Sedentary', 'Moderate', 'Active'].map(opt => (
                          <button
                            key={opt}
                            className={`pill ${onboardingData.activity === opt ? 'selected' : ''}`}
                            onClick={() => setOnboardingData({...onboardingData, activity: opt})}
                          >
                            {opt}
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                  {onboardingStep === 8 && (
                    <>
                      <h2 style={{ fontSize: '20px', fontWeight: 600, marginBottom: '16px' }}>
                        How many hours do you sleep on average?
                      </h2>
                      <input
                        type="number"
                        min="1"
                        max="12"
                        placeholder="Hours"
                        value={onboardingData.sleep}
                        onChange={(e) => setOnboardingData({...onboardingData, sleep: e.target.value})}
                      />
                    </>
                  )}
                </div>
                <button
                  className="btn-primary"
                  onClick={() => {
                    if (onboardingStep === 8) {
                      showScreen('screen-4');
                    } else {
                      setOnboardingStep(onboardingStep + 1);
                    }
                  }}
                >
                  Next
                </button>
              </div>
            </div>
          </div>

          {/* Screen 4 - Medical Records Upload */}
          <div id="screen-4" className={`screen ${currentScreen === 'screen-4' ? 'active' : ''}`}>
            <div style={{ padding: '32px' }}>
              <h1 style={{ fontWeight: 700, fontSize: '24px' }}>
                Do you have health records?
              </h1>
              <p style={{ fontSize: '14px', color: 'var(--sub)', marginTop: '8px', marginBottom: '32px' }}>
                Optional — helps Cor know you better from day one.
              </p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                <div
                  className="card"
                  onClick={() => {
                    document.getElementById('file-input').click();
                  }}
                  style={{ cursor: 'pointer', textAlign: 'center' }}
                >
                  <div style={{ fontSize: '32px', marginBottom: '8px' }}>📄</div>
                  <div style={{ fontWeight: 600, fontSize: '16px' }}>Upload a file</div>
                  <div style={{ fontSize: '14px', color: 'var(--sub)', marginTop: '4px' }}>
                    PDF or image
                  </div>
                  {fileUploaded && (
                    <div style={{ marginTop: '12px', color: 'var(--accent)', fontSize: '14px' }}>
                      Got it. I've noted your history.
                    </div>
                  )}
                </div>
                <input
                  id="file-input"
                  type="file"
                  style={{ display: 'none' }}
                  onChange={() => setFileUploaded(true)}
                  accept=".pdf,image/*"
                />
                <div
                  className="card"
                  onClick={() => showScreen('screen-5')}
                  style={{ cursor: 'pointer', textAlign: 'center' }}
                >
                  <div style={{ fontSize: '32px', marginBottom: '8px' }}>→</div>
                  <div style={{ fontWeight: 600, fontSize: '16px' }}>Skip for now</div>
                </div>
              </div>
              {fileUploaded && (
                <button className="btn-primary" onClick={() => showScreen('screen-5')}>
                  Continue
                </button>
              )}
            </div>
          </div>

          {/* Screen 5 - Smartwatch Connect */}
          <div id="screen-5" className={`screen ${currentScreen === 'screen-5' ? 'active' : ''}`}>
            <div style={{ padding: '32px' }}>
              <h1 style={{ fontWeight: 700, fontSize: '24px', marginBottom: '24px' }}>
                Do you own a smartwatch?
              </h1>
              <div style={{
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: '12px',
                marginBottom: '24px'
              }}>
                {['Apple Health', 'Google Health', 'Samsung Health', 'Fitbit'].map(device => (
                  <div key={device} className="card" style={{ textAlign: 'center' }}>
                    <div style={{ fontWeight: 600, fontSize: '14px', marginBottom: '12px' }}>
                      {device}
                    </div>
                    {!connectedDevices.includes(device) ? (
                      <button
                        onClick={() => setConnectedDevices([...connectedDevices, device])}
                        style={{
                          border: '1px solid var(--accent)',
                          background: 'transparent',
                          color: 'var(--accent)',
                          borderRadius: '8px',
                          padding: '6px 12px',
                          fontSize: '13px'
                        }}
                      >
                        Connect
                      </button>
                    ) : (
                      <div style={{ color: 'var(--accent)', fontSize: '20px' }}>✓</div>
                    )}
                  </div>
                ))}
              </div>
              <div
                onClick={() => showScreen('screen-6')}
                style={{
                  textAlign: 'center',
                  color: 'var(--sub)',
                  fontSize: '14px',
                  textDecoration: 'underline',
                  cursor: 'pointer',
                  marginBottom: '16px'
                }}
              >
                I don't have one
              </div>
              {connectedDevices.length > 0 && (
                <button className="btn-primary" style={{ marginTop: 0 }} onClick={() => showScreen('screen-6')}>
                  Continue
                </button>
              )}
            </div>
          </div>

          {/* Screen 6 - First BP Reading */}
          <div id="screen-6" className={`screen ${currentScreen === 'screen-6' ? 'active' : ''}`}>
            <div style={{ padding: '32px', textAlign: 'center' }}>
              <h1 style={{ fontWeight: 700, fontSize: '24px', marginBottom: '12px' }}>
                Let's get your baseline
              </h1>
              <p style={{ fontSize: '16px', color: 'var(--sub)', marginBottom: '32px' }}>
                Place your finger gently over your phone's back camera and hold still.
              </p>
              
              {!isReading && !bpReading && (
                <button className="btn-primary" onClick={() => startBPReading(true)}>
                  Start Reading
                </button>
              )}

              {isReading && (
                <>
                  <svg width="96" height="96" style={{ margin: '0 auto 16px' }}>
                    <circle
                      cx="48"
                      cy="48"
                      r="45"
                      stroke="var(--border)"
                      strokeWidth="6"
                      fill="none"
                    />
                    <circle
                      cx="48"
                      cy="48"
                      r="45"
                      stroke="var(--accent)"
                      strokeWidth="6"
                      fill="none"
                      strokeDasharray="283"
                      strokeDashoffset="283"
                      style={{
                        transformOrigin: 'center',
                        transform: 'rotate(-90deg)',
                        animation: 'ring 30s linear forwards'
                      }}
                    />
                    <text
                      x="48"
                      y="58"
                      textAnchor="middle"
                      fontSize="28"
                      fontWeight="700"
                      fill="var(--text)"
                    >
                      {countdown}
                    </text>
                  </svg>
                  <div style={{
                    color: countdown > 20 || countdown < 15 ? 'var(--accent)' : 'var(--amber)',
                    fontSize: '14px'
                  }}>
                    {countdown > 20 || countdown < 15 ? 'Signal: Good' : 'Adjust finger'}
                  </div>
                </>
              )}

              {bpReading && (
                <>
                  <div className="card" style={{ textAlign: 'left', marginBottom: '16px' }}>
                    <div style={{ fontSize: '18px', fontWeight: 600, marginBottom: '12px' }}>
                      Heart Rate: {bpReading.hr} bpm — Normal
                    </div>
                    <div style={{ fontSize: '16px', marginBottom: '12px' }}>
                      HRV: {bpReading.hrv}ms — Healthy range
                    </div>
                    <div style={{ fontSize: '15px', color: 'var(--text)', lineHeight: 1.6 }}>
                      {bpReading.message}
                    </div>
                  </div>
                  <button className="btn-primary" onClick={() => showScreen('screen-7')}>
                    Enter Cor
                  </button>
                </>
              )}
            </div>
          </div>

          {/* Screen 7 - Home Screen */}
          <div id="screen-7" className={`screen ${currentScreen === 'screen-7' ? 'active' : ''}`}>
            <div style={{ padding: '24px 24px 140px 24px' }}>
              <div style={{ marginBottom: '20px' }}>
                <h1 style={{ fontWeight: 700, fontSize: '22px' }}>
                  Good morning, {onboardingData.name || 'Chidi'}
                </h1>
                <div style={{ fontSize: '13px', color: 'var(--sub)' }}>
                  Saturday, 21 Feb
                </div>
              </div>

              <div className="card" style={{
                borderLeft: '3px solid var(--accent)',
                marginBottom: '12px'
              }}>
                <div style={{
                  fontSize: '11px',
                  fontWeight: 600,
                  letterSpacing: '1px',

                {[
                  { label: 'How Cor works' },
                  { label: 'Clinical disclaimer' }
                ].map(item => (
                  <div key={item.label} style={{
                    padding: '16px 0',
                    borderBottom: '1px solid var(--border)',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    cursor: 'pointer'
                  }}>
                    <div>{item.label}</div>
                    <div style={{ color: 'var(--sub)' }}>›</div>
                  </div>
                ))}
                <div style={{
                  padding: '16px 0',
                  borderBottom: '1px solid var(--border)',
                  color: 'var(--sub)'
                }}>
                  Version — Cor v1.0 — Hackathon Build
                </div>
              </div>
            </div>
          </div>

          {/* Alert Overlay (Screen 13) */}
          <div className={`overlay ${showAlert ? 'visible' : ''}`}>
            <div style={{ maxWidth: '400px', margin: '0 auto' }}>
              <div style={{
                width: '80px',
                height: '80px',
                borderRadius: '50%',
                background: 'var(--alert)',
                margin: '0 auto 24px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                animation: 'pulse 2s ease-in-out infinite'
              }}>
                <div style={{ fontSize: '32px', color: 'white' }}>♥</div>
              </div>

              <div className="card" style={{ marginBottom: '16px' }}>
                <div style={{
                  fontSize: '11px',
                  fontWeight: 600,
                  letterSpacing: '1px',
                  color: 'var(--sub)',
                  marginBottom: '8px'
                }}>
                  WHAT I NOTICED
                </div>
                <p style={{ fontSize: '15px', lineHeight: 1.6 }}>
                  Your cardiovascular stress has been elevated for 6 days in a row. Your sleep has 
                  averaged 5 hours and you have been mostly sedentary.
                </p>
              </div>

              <div className="card" style={{ marginBottom: '16px' }}>
                <div style={{
                  fontSize: '11px',
                  fontWeight: 600,
                  letterSpacing: '1px',
                  color: 'var(--sub)',
                  marginBottom: '8px'
                }}>
                  WHAT THIS MEANS
                </div>
                <p style={{ fontSize: '15px', lineHeight: 1.6 }}>
                  This pattern is consistent with early-stage cardiovascular stress. It does not mean 
                  something is wrong — but it is worth paying attention to.
                </p>
              </div>

              <div className="card" style={{ marginBottom: '16px' }}>
                <div style={{
                  fontSize: '11px',
                  fontWeight: 600,
                  letterSpacing: '1px',
                  color: 'var(--sub)',
                  marginBottom: '8px'
                }}>
                  WHAT TO DO NOW
                </div>
                <p style={{ fontSize: '15px', lineHeight: 1.6 }}>
                  1. Drink a glass of water now.<br/>
                  2. Take a 10-minute walk today.<br/>
                  3. Get a physical BP check this week.
                </p>
              </div>

              <button
                className="btn-primary"
                style={{ marginTop: 0 }}
                onClick={() => alert('Opening maps...')}
              >
                Find a BP check near me
              </button>

              <button className="btn-secondary" onClick={() => alert('Reminder set')}>
                Remind me in 2 hours
              </button>

              <div
                onClick={() => setShowAlert(false)}
                style={{
                  textAlign: 'center',
                  color: 'var(--sub)',
                  fontSize: '13px',
                  textDecoration: 'underline',
                  cursor: 'pointer',
                  marginTop: '16px'
                }}
              >
                Dismiss
              </div>
            </div>
          </div>

          {/* Hey Cor Modal */}
          <div className={`modal-bottom ${showHeyCor ? 'visible' : ''}`}>
            <div
              onClick={() => setShowHeyCor(false)}
              style={{
                position: 'absolute',
                top: '12px',
                right: '12px',
                color: 'var(--sub)',
                fontSize: '20px',
                cursor: 'pointer'
              }}
            >
              ×
            </div>
            <div style={{
              width: '48px',
              height: '48px',
              borderRadius: '50%',
              background: 'var(--accent)',
              margin: '0 auto 16px',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              animation: 'pulse 2s ease-in-out infinite'
            }}>
              <div style={{ fontSize: '24px', color: '#0A0F1E' }}>♥</div>
            </div>
            <div style={{
              fontSize: '14px',
              color: 'var(--sub)',
              textAlign: 'center',
              marginBottom: '16px'
            }}>
              Listening...
            </div>
            <div
              onClick={() => setCorResponse("Your stress has been climbing this week. Try to get to bed before 10pm tonight and drink plenty of water. I'm watching over you.")}
              style={{
                minHeight: '80px',
                textAlign: 'center',
                fontSize: '16px',
                color: corResponse.includes('Ask me') ? 'var(--sub)' : 'var(--text)',
                padding: '0 16px',
                cursor: 'pointer'
              }}
            >
              {corResponse}
            </div>
          </div>

          {/* Hey Cor Button */}
          <button id="hey-cor-button" onClick={() => setShowHeyCor(true)}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2h2v2a5 5 0 0 0 10 0v-2h2z"/>
              <path d="M11 20h2v2h-2z"/>
            </svg>
          </button>

          {/* Bottom Navigation */}
          <nav id="bottom-nav">
            <div className={`nav-tab ${activeNav === 'home' ? 'active' : ''}`} onClick={() => navigateTo('home')}>
              <div className="nav-tab-icon">🏠</div>
              <div>Home</div>
            </div>
            <div className={`nav-tab ${activeNav === 'insights' ? 'active' : ''}`} onClick={() => navigateTo('insights')}>
              <div className="nav-tab-icon">💡</div>
              <div>Insights</div>
            </div>
            <div className={`nav-tab ${activeNav === 'log' ? 'active' : ''}`} onClick={() => navigateTo('log')}>
              <div className="nav-tab-icon">📝</div>
              <div>Log</div>
            </div>
            <div className={`nav-tab ${activeNav === 'settings' ? 'active' : ''}`} onClick={() => navigateTo('settings')}>
              <div className="nav-tab-icon">⚙️</div>
              <div>Settings</div>
            </div>
          </nav>
        </>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
